<title>India Mineral Resources Map</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f5f5f0; }
  h1 { text-align: center; font-size: 20px; font-weight: 600; color: #1a1a2e; padding: 16px 0 4px; }
  p.sub { text-align: center; font-size: 12px; color: #555; margin-bottom: 12px; }
  .map-wrapper { position: relative; max-width: 720px; margin: 0 auto; }
  .map-wrapper img { width: 100%; display: block; border-radius: 8px; }
  .overlay { position: absolute; inset: 0; pointer-events: none; }
  .dot { position: absolute; width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid white; transform: translate(-50%, -50%); cursor: pointer; pointer-events: all; transition: transform 0.12s; z-index: 10; }
  .dot:hover { transform: translate(-50%, -50%) scale(1.8); z-index: 20; }
  #tip { position: absolute; display: none; background: white; border: 1px solid #ddd; border-radius: 8px; padding: 8px 11px; font-size: 12px; z-index: 50; pointer-events: none; max-width: 210px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  #tip .tip-name { font-weight: 600; margin-bottom: 3px; }
  #tip .tip-loc { color: #444; font-size: 11px; line-height: 1.4; }
  .legend { max-width: 720px; margin: 14px auto 20px; display: flex; flex-wrap: wrap; gap: 7px; padding: 0 4px; }
  .leg-btn { display: flex; align-items: center; gap: 5px; padding: 4px 11px 4px 8px; border-radius: 20px; border: 2px solid; cursor: pointer; font-size: 12px; background: white; transition: all 0.15s; }
  .leg-btn.active { color: white !important; }
  .leg-btn .sym { font-weight: 700; font-size: 11px; }
  .leg-btn .lab { font-size: 11px; }
  .controls { max-width: 720px; margin: 0 auto 8px; display: flex; gap: 8px; padding: 0 4px; }
  .ctrl-btn { font-size: 12px; padding: 4px 12px; border: 1px solid #aaa; border-radius: 6px; background: white; cursor: pointer; color: #333; }
  .ctrl-btn:hover { background: #eee; }
</style>
</head>

const active = new Set(minerals.map(m => m.name));
const overlay = document.getElementById('overlay');
const tip = document.getElementById('tip');
const tipName = document.getElementById('tip-name');
const tipLoc = document.getElementById('tip-loc');
const mapWrap = document.getElementById('mapWrap');

function buildDots() {
  overlay.innerHTML = '';
  minerals.forEach(m => {
    if (!active.has(m.name)) return;
    m.locs.forEach(loc => {
      const d = document.createElement('div');
      d.className = 'dot';
      d.style.cssText = 'position:absolute;width:10px;height:10px;border-radius:50%;border:1.5px solid white;transform:translate(-50%,-50%);cursor:pointer;pointer-events:all;transition:transform 0.12s;z-index:10;';
      d.style.left = loc.x + '%';
      d.style.top = loc.y + '%';
      d.style.background = m.color;
      d.addEventListener('mouseenter', e => {
        d.style.transform = 'translate(-50%,-50%) scale(1.9)';
        tipName.textContent = m.name;
        tipName.style.color = m.color;
        tipLoc.textContent = loc.l;
        tip.style.display = 'block';
        const mRect = mapWrap.getBoundingClientRect();
        const dRect = d.getBoundingClientRect();
        let tx = (dRect.left - mRect.left) + 14;
        let ty = (dRect.top - mRect.top) - 10;
        if (tx + 215 > mRect.width) tx = (dRect.left - mRect.left) - 220;
        if (ty < 0) ty = 5;
        if (ty + 120 > mRect.height) ty = mRect.height - 125;
        tip.style.left = tx + 'px';
        tip.style.top = ty + 'px';
      });
      d.addEventListener('mouseleave', () => {
        d.style.transform = 'translate(-50%,-50%) scale(1)';
        tip.style.display = 'none';
      });
      overlay.appendChild(d);
    });
  });
}

function buildLegend() {
  const leg = document.getElementById('legend');
  leg.innerHTML = '';
  minerals.forEach(m => {
    const b = document.createElement('button');
    b.className = 'leg-btn' + (active.has(m.name) ? ' active' : '');
    b.style.borderColor = m.color;
    b.style.background = active.has(m.name) ? m.color : 'white';
    const col = active.has(m.name) ? 'white' : m.color;
    b.innerHTML = '<span class="sym" style="color:'+col+'">'+m.sym+'</span><span class="lab" style="color:'+col+'">'+m.name+'</span>';
    b.onclick = () => {
      if (active.has(m.name)) active.delete(m.name);
      else active.add(m.name);
      buildDots(); buildLegend();
    };
    leg.appendChild(b);
  });
}

function setAll(on) {
  minerals.forEach(m => on ? active.add(m.name) : active.delete(m.name));
  buildDots(); buildLegend();
}

buildDots();
buildLegend();
